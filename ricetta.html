<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ricetta — Ricettacolo</title>
  <script>
    (function() {
      var saved = localStorage.getItem('ricettacolo-theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body class="page-recipe">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">R</span>
        <span class="brand-name">Ricettacolo</span>
      </a>
      <nav class="site-nav">
        <a href="index.html#ricette">Tutte le ricette</a>
        <button id="theme-toggle" class="icon-btn" type="button" aria-label="Cambia tema chiaro/scuro">
          <svg class="theme-icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="theme-icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2"/><path d="M12 20v2"/>
            <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
            <path d="M2 12h2"/><path d="M20 12h2"/>
            <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="container recipe-page">
    <a href="index.html#ricette" class="back-link">← Torna alle ricette</a>

    <div id="recipe-content">
      <p class="loading">Caricamento ricetta...</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Ricettacolo</p>
    </div>
  </footer>

  <script src="js/parser.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/recipe.js"></script>
</body>
</html>
